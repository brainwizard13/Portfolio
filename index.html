<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name | Professional Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0b;
            --accent: #ffffff;
            --gold: #c5a358;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: var(--font-sans); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        .section { 
            padding: 80px 10%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 60px; 
            align-items: center; 
            width: 100%; 
            max-width: 1200px; 
        }

        /* --- THE IMAGE PROTECTION & QUALITY --- */
        .image-wrapper { 
            position: relative; 
            width: 100%; 
            /* 3/2 aspect ratio fits your 4087x2725 landscape photo perfectly */
            aspect-ratio: 3 / 2; 
            background: #151517; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .shield { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; 
            background: transparent; 
        }

        .image-wrapper img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            user-select: none; 
            -webkit-user-drag: none;
            
            /* FIX FOR PIXELATION */
            image-rendering: -webkit-optimize-contrast; 
            image-rendering: high-quality;
            transform: translateZ(0);
        }

        /* --- TEXT STYLING --- */
        .content h2 { font-family: var(--font-serif); font-size: 3rem; margin-bottom: 20px; font-style: italic; }
        .content p { color: #888; margin-bottom: 30px; font-weight: 300; }
        
        .achievement-box {
            border-left: 1px solid var(--gold);
            padding-left: 20px;
            margin-bottom: 30px;
        }

        .btn { 
            display: inline-block; 
            padding: 15px 35px; 
            border: 1px solid white; 
            color: white; 
            text-decoration: none; 
            letter-spacing: 2px; 
            font-size: 0.8rem; 
            text-transform: uppercase;
            transition: 0.3s; 
        }

        .btn:hover { background: white; color: black; }

        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>

    <section class="section">
        <div class="grid">
            <div class="image-wrapper" id="secure-area">
                <div class="shield"></div>
                <img src="assets/Profile_picture.jpeg" alt="Professional Portrait">
            </div>

            <div class="content">
                <h2>The Profile</h2>
                <p>An insightful summary of your professional journey. Connect your specific expertise with your long-term career goals here.</p>
                
                <div class="achievement-box">
                    <h3 style="font-size: 1.2rem; color: var(--gold);">Major Achievement</h3>
                    <p style="margin-bottom: 0; font-size: 0.9rem;">Lead architect on the 2026 digital expansion project.</p>
                </div>

                <a href="assets/your-resume.pdf" class="btn" target="_blank">Download CV</a>
            </div>
        </div>
    </section>

    <script>
        const secureArea = document.getElementById('secure-area');
        secureArea.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            alert("This image is protected for privacy.");
        }, false);
    </script>

</body>
</html>
