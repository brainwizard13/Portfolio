<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Identity 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Plus+Jakarta+Sans:wght@200;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #070708;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; } /* Custom invisible cursor feel */
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- STUNNING HERO BANNER --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10%;
            position: relative;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 400;
            line-height: 0.9;
            letter-spacing: -0.04em;
            text-transform: lowercase;
            z-index: 2;
        }

        .hero h1 span {
            display: block;
            padding-left: 20%;
            font-style: italic;
            font-weight: 700;
        }

        /* --- SPACED GRID LAYOUT --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            padding: 0 10% 100px;
        }

        /* PHOTO SLOT 1 (Portrait) */
        .photo-slot-large {
            grid-column: 1 / 7;
            background: var(--glass);
            aspect-ratio: 4 / 5;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        /* THE PROTECTED PROFILE IMAGE */
        .image-wrapper { width: 100%; height: 100%; position: relative; }
        .shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        .image-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            image-rendering: high-quality;
            filter: grayscale(100%) contrast(1.1); /* Cinematic Igloo look */
            transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* PHOTO SLOT 2 (Space for future work) */
        .photo-slot-empty {
            grid-column: 8 / 13;
            margin-top: 200px; /* Asymmetric spacing */
            background: var(--glass);
            aspect-ratio: 1 / 1;
            border: 1px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* --- CONTENT BLOCKS --- */
        .statement {
            grid-column: 2 / 7;
            padding: 100px 0;
            font-size: 1.5rem;
            font-weight: 200;
            line-height: 1.6;
        }

        .achievements {
            grid-column: 8 / 12;
            padding-top: 100px;
        }

        .achievements h3 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        .item {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        /* --- HIDE DEFAULT MOUSE --- */
        #custom-cursor {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        @media (max-width: 900px) {
            .grid-container { display: flex; flex-direction: column; }
            .hero h1 { font-size: 5rem; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <section class="hero">
        <h1>pure<span>creative</span></h1>
    </section>

    <main class="grid-container">
        <div class="photo-slot-large" id="secure-area">
            <div class="shield"></div>
            <div class="image-wrapper">
                <img src="assets/Profile_picture.jpeg" alt="Identity">
            </div>
        </div>

        <div class="statement">
            <p>I build digital architectures that resonate. My philosophy is rooted in the "Igloo" approach: creating warmth and human connection within the cold precision of technology.</p>
        </div>

        <div class="photo-slot-empty">
            [PLACEHOLDER FOR PROJECT_01]
        </div>

        <div class="achievements">
            <h3>Excellence</h3>
            <div class="item"><span>Lead Designer</span> <span>2026</span></div>
            <div class="item"><span>Technical Architect</span> <span>2024</span></div>
            <div class="item"><span>Innovation Award</span> <span>2023</span></div>
        </div>
    </main>

    <script>
        // Custom Smooth Cursor
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Security
        document.getElementById('secure-area').addEventListener('contextmenu', e => {
            e.preventDefault();
        });
    </script>
</body>
</html>
